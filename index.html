<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gophers</title>
  <style>
    @font-face {
      font-family: "jikitourai.regular";
      src: url("./jikitourai.regular.ttf") format("truetype");
      font-style: normal;
      font-weight: 400;
    }

    @font-face {
      font-family: "Ioskeley";
      src: url("./Ioskeley.woff2") format("woff2");
      font-style: normal;
      font-weight: 400;
    }

    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: "jikitourai.regular", "Ioskeley";
    }

    img {
      display: block;
      width: min(480px, 70vw);
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <img src="./logo.png" alt="Gophers logo">
</body>
</html>
